<section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">お問い合わせ</h1>
        <p class="page-hero-sub">— バグの報告や機能のご要望はこちらからお送り下さい</p>
      </div>
    </section>

    <section class="form-section">
      <div class="container">
        <div class="form-container">

          <div class="form-panel" id="contact-panel">
            <h2 class="panel-title">メッセージを送る</h2>

            <!--
              ===== Formspree セットアップ手順 =====
              このフォームは https://formspree.io 経由で hisatasan1@gmail.com に届く設計です

              【手順】
              1. https://formspree.io にアクセスして Sign up
                 (ログインメールに hisatasan1@gmail.com を指定 → メール認証)
              2. ダッシュボードで「+ New Form」 を作成
                 - Form name: MokuMoku 問い合わせ (任意)
                 - Send to: hisatasan1@gmail.com
              3. 作成後、 form の URL (例: https://formspree.io/f/xxxxxxxx)
                 が表示されるので、 下の action="" の中をその URL に置き換える
              4. 完成 送信されると hisatasan1@gmail.com に通知が届きます
                 (無料プランは 月 50 通まで 超える場合は Formspree の Pro プラン $10/月)

              ※ ローカル開発中 (file:// で開いた時など) は CORS で送信エラーになります
                 GitHub Pages にデプロイ後にテストしてください
            -->
            <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>
              <!-- 件名 (Gmail 受信時に表示される) -->
              <input type="hidden" name="_subject" value="MokuMoku — お問い合わせ">
              <!-- スパム対策 (Formspree 標準ハニーポット) -->
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="field-group">
                <label for="cname">お名前 <span class="required">*</span></label>
                <input type="text" id="cname" name="name" placeholder="例:山田 太郎" autocomplete="name" required>
                <span class="error-msg" id="err-cname"></span>
              </div>

              <div class="field-group">
                <label for="email">メールアドレス <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="例:taro@example.com" autocomplete="email" required>
                <span class="error-msg" id="err-email"></span>
              </div>

              <div class="field-group">
                <label for="category">お問い合わせの種類 <span class="required">*</span></label>
                <select id="category" name="category" required>
                  <option value="">選択してください</option>
                  <option value="bug">バグ報告</option>
                  <option value="request">機能の要望</option>
                  <option value="other">その他</option>
                </select>
                <span class="error-msg" id="err-cat"></span>
              </div>

              <div class="field-group">
                <label for="message">メッセージ <span class="required">*</span></label>
                <textarea id="message" name="message" rows="6" placeholder="具体的な内容をご記入下さい" required></textarea>
                <span class="error-msg" id="err-msg"></span>
              </div>

              <button type="submit" class="btn-primary btn-full">送信する →</button>
            </form>
          </div>

          <div class="result-panel" id="thanks-panel" hidden>
            <div class="result-icon">✅</div>
            <h2 class="result-title">送信完了！</h2>
            <p class="result-sub">お問い合わせ有難う御座います！<br>内容を確認の上、担当者よりご連絡致します</p>
            <a href="index.html" class="btn-ghost" data-page="home">トップページへ戻る</a>
          </div>

        </div>
      </div>
    </section>

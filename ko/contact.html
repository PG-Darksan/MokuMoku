        <h1 class="page-hero-title">문의하기</h1>
        <p class="page-hero-sub">— 버그 보고나 기능 요청은 여기에서.</p>
      </div>
    </section>

    <section class="form-section">
      <div class="container">
        <div class="form-container">

          <div class="form-panel" id="contact-panel">
            <h2 class="panel-title">메시지を送る</h2>

            <!--
              ===== Formspree セットアップ手順 =====
              このフォームは https://formspree.io 経由で hisatasan1@gmail.com に届く設計です

              【手順】
              1. https://formspree.io にアクセスして Sign up
                 (ログインメールに hisatasan1@gmail.com を指定 → メール認証)
              2. ダッシュボードで「+ New Form」 を作成
                 - Form name: MokuMoku 問い合わせ (任意)
                 - Send to: hisatasan1@gmail.com
              3. 作成後、 form の URL (例: https://formspree.io/f/xxxxxxxx)
                 が表示されるので、 下の action="" の中をその URL に置き換える
              4. 完成 送信されると hisatasan1@gmail.com に通知が届きます
                 (無料요금제は 月 50 通まで 超える場合は Formspree の Pro 요금제 $10/월)

              ※ ローカル開発中 (file:// で開いた時など) は CORS で送信エラーになります
                 GitHub Pages にデ프로イ後にテストしてください
            -->
            <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>
              <!-- 件名 (Gmail 受信時に表示される) -->
              <input type="hidden" name="_subject" value="MokuMoku — 문의하기">
              <!-- スパム対策 (Formspree 標準ハニーポット) -->
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="field-group">
                <label for="cname">이름 <span class="required">*</span></label>
                <input type="text" id="cname" name="name" placeholder="예: 홍길동" autocomplete="name" required>
                <span class="error-msg" id="err-cname"></span>
              </div>

              <div class="field-group">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="예: hong@example.com" autocomplete="email" required>
                <span class="error-msg" id="err-email"></span>
              </div>

              <div class="field-group">
                <label for="category">문의하기の種類 <span class="required">*</span></label>
                <select id="category" name="category" required>
                  <option value="">선택해 주세요</option>
                  <option value="bug">버그 보고</option>
                  <option value="request">기능 요청</option>
                  <option value="other">기타</option>
                </select>
                <span class="error-msg" id="err-cat"></span>
              </div>

              <div class="field-group">
                <label for="message">메시지 <span class="required">*</span></label>
                <textarea id="message" name="message" rows="6" placeholder="구체적인 내용을 적어주세요" required></textarea>
                <span class="error-msg" id="err-msg"></span>
              </div>

              <button type="submit" class="btn-primary btn-full">보내기 →</button>
            </form>
          </div>

          <div class="result-panel" id="thanks-panel" hidden>
            <div class="result-icon">✅</div>
            <h2 class="result-title">전송 완료!</h2>
            <p class="result-sub">문의하기有難う御座います！<br>내용 확인 후 연락드립니다.</p>
            <a href="index.html" class="btn-ghost" data-page="home">홈ページへ戻る</a>
          </div>

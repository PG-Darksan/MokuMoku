<section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">Contact</h1>
        <p class="page-hero-sub">— バグの報告や機能のご要望はこちらからお送り下さい</p>
      </div>
    </section>

    <section class="form-section">
      <div class="container">
        <div class="form-container">

          <div class="form-panel" id="contact-panel">
            <h2 class="panel-title">Messageを送る</h2>

            <!--
              ===== Formspree セットアップ手順 =====
              このフォームは https://formspree.io 経由で hisatasan1@gmail.com に届く設計です

              【手順】
              1. https://formspree.io にアクセスして Sign up
                 (ログインメールに hisatasan1@gmail.com を指定 → メール認証)
              2. ダッシュボードで「+ New Form」 を作成
                 - Form name: MokuMoku 問い合わせ (任意)
                 - Send to: hisatasan1@gmail.com
              3. 作成後、 form の URL (例: https://formspree.io/f/xxxxxxxx)
                 が表示されるので、 下の action="" の中をその URL に置き換える
              4. 完成 送信されると hisatasan1@gmail.com に通知が届きます
                 (無料Pricingは 月 50 通まで 超える場合は Formspree の Pro Pricing $10/mo)

              ※ ローカル開発中 (file:// で開いた時など) は CORS で送信エラーになります
                 GitHub Pages にデProイ後にテストしてください
            -->
            <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>
              <!-- 件名 (Gmail 受信時に表示される) -->
              <input type="hidden" name="_subject" value="MokuMoku — Contact">
              <!-- スパム対策 (Formspree 標準ハニーポット) -->
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="field-group">
                <label for="cname">Name <span class="required">*</span></label>
                <input type="text" id="cname" name="name" placeholder="e.g. John Smith" autocomplete="name" required>
                <span class="error-msg" id="err-cname"></span>
              </div>

              <div class="field-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="e.g. john@example.com" autocomplete="email" required>
                <span class="error-msg" id="err-email"></span>
              </div>

              <div class="field-group">
                <label for="category">Contactの種類 <span class="required">*</span></label>
                <select id="category" name="category" required>
                  <option value="">Please select</option>
                  <option value="bug">Bug report</option>
                  <option value="request">Feature request</option>
                  <option value="other">Other</option>
                </select>
                <span class="error-msg" id="err-cat"></span>
              </div>

              <div class="field-group">
                <label for="message">Message <span class="required">*</span></label>
                <textarea id="message" name="message" rows="6" placeholder="Please describe in detail" required></textarea>
                <span class="error-msg" id="err-msg"></span>
              </div>

              <button type="submit" class="btn-primary btn-full">Send →</button>
            </form>
          </div>

          <div class="result-panel" id="thanks-panel" hidden>
            <div class="result-icon">✅</div>
            <h2 class="result-title">Sent!</h2>
            <p class="result-sub">Contact有難う御座います！<br>We'll review and get back to you.</p>
            <a href="index.html" class="btn-ghost" data-page="home">Homeページへ戻る</a>
          </div>

        </div>

    </section>

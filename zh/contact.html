<section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">联系我们</h1>
        <p class="page-hero-sub">— 请在此提交错误报告或功能请求。</p>
      </div>
    </section>

    <section class="form-section">
      <div class="container">
        <div class="form-container">

          <div class="form-panel" id="contact-panel">
            <h2 class="panel-title">留言を送る</h2>

            <!--
              ===== Formspree セットアップ手順 =====
              このフォームは https://formspree.io 経由で hisatasan1@gmail.com に届く設計です

              【手順】
              1. https://formspree.io にアクセスして Sign up
                 (ログインメールに hisatasan1@gmail.com を指定 → メール認証)
              2. ダッシュボードで「+ New Form」 を作成
                 - Form name: MokuMoku 問い合わせ (任意)
                 - Send to: hisatasan1@gmail.com
              3. 作成後、 form の URL (例: https://formspree.io/f/xxxxxxxx)
                 が表示されるので、 下の action="" の中をその URL に置き換える
              4. 完成 送信されると hisatasan1@gmail.com に通知が届きます
                 (無料价格は 月 50 通まで 超える場合は Formspree の Pro 价格 $10/月)

              ※ ローカル開発中 (file:// で開いた時など) は CORS で送信エラーになります
                 GitHub Pages にデ专业イ後にテストしてください
            -->
            <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>
              <!-- 件名 (Gmail 受信時に表示される) -->
              <input type="hidden" name="_subject" value="MokuMoku — 联系我们">
              <!-- スパム対策 (Formspree 標準ハニーポット) -->
              <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

              <div class="field-group">
                <label for="cname">姓名 <span class="required">*</span></label>
                <input type="text" id="cname" name="name" placeholder="例:张三" autocomplete="name" required>
                <span class="error-msg" id="err-cname"></span>
              </div>

              <div class="field-group">
                <label for="email">邮箱 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="例:zhang@example.com" autocomplete="email" required>
                <span class="error-msg" id="err-email"></span>
              </div>

              <div class="field-group">
                <label for="category">联系我们の種類 <span class="required">*</span></label>
                <select id="category" name="category" required>
                  <option value="">请选择</option>
                  <option value="bug">错误报告</option>
                  <option value="request">功能请求</option>
                  <option value="other">其他</option>
                </select>
                <span class="error-msg" id="err-cat"></span>
              </div>

              <div class="field-group">
                <label for="message">留言 <span class="required">*</span></label>
                <textarea id="message" name="message" rows="6" placeholder="请详细描述" required></textarea>
                <span class="error-msg" id="err-msg"></span>
              </div>

              <button type="submit" class="btn-primary btn-full">发送 →</button>
            </form>
          </div>

          <div class="result-panel" id="thanks-panel" hidden>
            <div class="result-icon">✅</div>
            <h2 class="result-title">发送成功!</h2>
            <p class="result-sub">联系我们有難う御座います！<br>我们会审阅并回复。</p>
            <a href="index.html" class="btn-ghost" data-page="home">首页ページへ戻る</a>
          </div>

        </div>
      </div>
    </section>
